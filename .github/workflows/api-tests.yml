# ============================================================
# RestAssured API Automation Framework — GitHub Actions CI/CD
# ============================================================
# Triggers:
#   - On every push to main/master branch
#   - On every Pull Request to main/master
#   - On manual trigger (Run workflow button in GitHub UI)
#   - On schedule (every day at 8:00 AM UTC)
# ============================================================

name: 🚀 RestAssured API Test Suite

on:

  # ── Trigger on push to main or master ──────────────────────
  push:
    branches:
      - main
      - master

  # ── Trigger on Pull Request ─────────────────────────────────
  pull_request:
    branches:
      - main
      - master

  # ── Manual trigger from GitHub UI ──────────────────────────
  # Go to Actions tab → Select this workflow → Click "Run workflow"
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'QA'
        type: choice
        options:
          - QA
          - STAGING
          - PROD
      test_class:
        description: 'Specific test class to run (leave empty for all tests)'
        required: false
        default: ''
        type: string

  # ── Scheduled run every day at 8:00 AM UTC ──────────────────
  schedule:
    - cron: '0 8 * * *'

# ============================================================
# JOBS
# ============================================================
jobs:

  # ────────────────────────────────────────────────────────────
  # JOB 1: Run the full API test suite
  # ────────────────────────────────────────────────────────────
  run-api-tests:
    name: 🧪 Run API Tests
    runs-on: ubuntu-latest

    # ── Environment variables available to all steps ──────────
    env:
      JAVA_VERSION: '11'
      MAVEN_OPTS: '-Xmx1024m'
      ENVIRONMENT: ${{ github.event.inputs.environment || 'QA' }}

    steps:

      # ── Step 1: Checkout the repository ─────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ── Step 2: Set up Java 11 ───────────────────────────────
      - name: ☕ Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven          # caches ~/.m2 between runs for faster builds

      # ── Step 3: Display environment info ────────────────────
      - name: 🔍 Display Environment Info
        run: |
          echo "========================================"
          echo "  Java Version : $(java -version 2>&1 | head -1)"
          echo "  Maven Version: $(mvn -version 2>&1 | head -1)"
          echo "  Environment  : ${{ env.ENVIRONMENT }}"
          echo "  Branch       : ${{ github.ref_name }}"
          echo "  Commit SHA   : ${{ github.sha }}"
          echo "  Triggered by : ${{ github.event_name }}"
          echo "========================================"

      # ── Step 4: Cache Maven dependencies ────────────────────
      - name: 📦 Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── Step 5: Set the API Key from GitHub Secrets ─────────
      # The API key is stored as a GitHub Secret (REQRES_API_KEY)
      # It is injected as a system property at runtime
      - name: 🔑 Configure API Key
        run: |
          echo "API key will be passed as a system property at test runtime"
          echo "Make sure REQRES_API_KEY is set in your GitHub repository Secrets"

      # ── Step 6: Run ALL tests ─────────────────────────────────
      - name: ▶️ Run All API Tests
        if: ${{ github.event.inputs.test_class == '' || github.event.inputs.test_class == null }}
        run: |
          mvn clean test \
            -Denvironment=${{ env.ENVIRONMENT }} \
            -Dreqres.api.key=${{ secrets.REQRES_API_KEY }} \
            -Denable.logging=true \
            -Dretry.count=2 \
            --no-transfer-progress \
            --batch-mode
        continue-on-error: true    # continue so reports are always uploaded

      # ── Step 6b: Run a SPECIFIC test class (manual trigger) ──
      - name: ▶️ Run Specific Test Class
        if: ${{ github.event.inputs.test_class != '' && github.event.inputs.test_class != null }}
        run: |
          mvn clean test \
            -Dtest=${{ github.event.inputs.test_class }} \
            -Denvironment=${{ env.ENVIRONMENT }} \
            -Dreqres.api.key=${{ secrets.REQRES_API_KEY }} \
            -Denable.logging=true \
            -Dretry.count=2 \
            --no-transfer-progress \
            --batch-mode
        continue-on-error: true

      # ── Step 7: Upload Surefire XML Reports ──────────────────
      - name: 📊 Upload Surefire Test Reports
        uses: actions/upload-artifact@v4
        if: always()             # upload even if tests fail
        with:
          name: surefire-reports-${{ github.run_number }}
          path: target/surefire-reports/
          retention-days: 30

      # ── Step 8: Upload ExtentReports HTML ────────────────────
      - name: 📈 Upload ExtentReports HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extent-report-${{ github.run_number }}
          path: reports/
          retention-days: 30

      # ── Step 9: Upload Allure Results ────────────────────────
      - name: 📉 Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ github.run_number }}
          path: target/allure-results/
          retention-days: 30

      # ── Step 10: Upload Log Files ─────────────────────────────
      - name: 📋 Upload Log Files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-logs-${{ github.run_number }}
          path: logs/
          retention-days: 15

      # ── Step 11: Parse and display test results ───────────────
      - name: 📝 Display Test Summary
        if: always()
        run: |
          echo "========================================"
          echo "         TEST EXECUTION SUMMARY         "
          echo "========================================"
          if [ -d "target/surefire-reports" ]; then
            TOTAL=$(grep -r 'tests=' target/surefire-reports/*.xml 2>/dev/null | \
                    grep -oP 'tests="\K[0-9]+' | awk '{s+=$1} END {print s}')
            FAILED=$(grep -r 'failures=' target/surefire-reports/*.xml 2>/dev/null | \
                     grep -oP 'failures="\K[0-9]+' | awk '{s+=$1} END {print s}')
            ERRORS=$(grep -r 'errors=' target/surefire-reports/*.xml 2>/dev/null | \
                     grep -oP 'errors="\K[0-9]+' | awk '{s+=$1} END {print s}')
            SKIPPED=$(grep -r 'skipped=' target/surefire-reports/*.xml 2>/dev/null | \
                      grep -oP 'skipped="\K[0-9]+' | awk '{s+=$1} END {print s}')
            PASSED=$((${TOTAL:-0} - ${FAILED:-0} - ${ERRORS:-0} - ${SKIPPED:-0}))
            echo "  Total   : ${TOTAL:-0}"
            echo "  Passed  : ${PASSED:-0} ✅"
            echo "  Failed  : ${FAILED:-0} ❌"
            echo "  Errors  : ${ERRORS:-0} 🔴"
            echo "  Skipped : ${SKIPPED:-0} ⚠️"
            echo "========================================"
          else
            echo "  No surefire reports found."
          fi

      # ── Step 12: Publish Test Results (GitHub native summary) ─
      - name: 📌 Publish Test Results to GitHub
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/*.xml
          check_name: 'API Test Results'
          comment_mode: always
          fail_on: 'test failures'

  # ────────────────────────────────────────────────────────────
  # JOB 2: Generate and Publish Allure Report to GitHub Pages
  # (Only runs on push to main/master — not on PRs)
  # ────────────────────────────────────────────────────────────
  publish-allure-report:
    name: 📊 Publish Allure Report
    runs-on: ubuntu-latest
    needs: run-api-tests           # waits for tests to complete
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:

      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📥 Download Allure Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-${{ github.run_number }}
          path: allure-results

      - name: 📊 Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      - name: 🌐 Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          destination_dir: allure-report
