# ============================================================
# RestAssured Framework — Configuration Properties
# ============================================================
# Override any property via system property: -Dkey=value
# Or via environment variable: KEY=value
# ============================================================

# ── Base URLs ────────────────────────────────────────────────
base.url=https://reqres.in
reqres.base.url=https://reqres.in
jsonplaceholder.base.url=https://jsonplaceholder.typicode.com

# ── Timeouts (milliseconds) ──────────────────────────────────
connection.timeout=30000
read.timeout=30000

# ── Retry ───────────────────────────────────────────────────
retry.count=2

# ── Logging ─────────────────────────────────────────────────
enable.logging=true
log.level=INFO

# ── Reports ─────────────────────────────────────────────────
report.path=reports/

# ── Environment ─────────────────────────────────────────────
environment=QA

# ── Authentication ───────────────────────────────────────────
reqres.api.key=reqres_cba85c36ac314e478cc78a2310c6fb92

# ── Content Type ─────────────────────────────────────────────
default.content.type=application/json

# ── Proxy (set proxy.enabled=true to activate) ───────────────
proxy.enabled=false
proxy.host=localhost
proxy.port=8080
